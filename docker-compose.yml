services:
 
  api:
    build: ./api
    container_name: api-igreja
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - NODE_ENV=${NODE_ENV}
      - API_PORT=${API_PORT}
      - KEYCLOAK_BASE_URL=http://keycloak:8080
      - KEYCLOAK_ENDPOINT_BASE=http://keycloak:8080
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-admin-cli}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_ADMIN_REALM=${KEYCLOAK_ADMIN_REALM:-master}
      - KEYCLOAK_USER=${KEYCLOAK_USER}
      - KEYCLOAK_PASSWORD=${KEYCLOAK_PASSWORD}
      - KEYCLOAK_GRANT_TYPE=${KEYCLOAK_GRANT_TYPE:-password}
      - KEYCLOAK_SECRET_KEY=${KEYCLOAK_SECRET_KEY}
      - KEYCLOAK_CLIENT_USER_ID=${KEYCLOAK_CLIENT_USER_ID:-${KEYCLOAK_REALM}}
      - KEYCLOAK_CLIENT_UUID=${KEYCLOAK_CLIENT_UUID:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    command: >-
      sh -c "npm install &&
      npx prisma migrate deploy --schema=src/infrastructure/database/prisma/schema.prisma &&
      npx prisma generate --schema=src/infrastructure/database/prisma/schema.prisma &&
      npx tsx watch --clear-screen=false server.ts"


  web:
    build: ./web
    container_name: web-igreja
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    volumes:
      - ./web:/usr/src/app
      - web_node_modules:/usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - NUXT_PUBLIC_URL_BACKEND=${NUXT_PUBLIC_URL_BACKEND:-http://localhost:${API_PORT}}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-3000}"
    depends_on:
      - api


  db:
    image: postgres:15-alpine
    container_name: db-igreja
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  
  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db-igreja
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak_db
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2 
    container_name: keycloak-igreja
    command: start-dev 
    ports:
      - "8080:8080" 
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  pgdata:
  keycloak_pgdata:
  web_node_modules:
