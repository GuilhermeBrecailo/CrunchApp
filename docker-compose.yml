services:
  api:
    build: ./api
    container_name: api-igreja
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./api:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - NODE_ENV=${NODE_ENV}
      - API_PORT=${API_PORT}
      - KEYCLOAK_BASE_URL=https://auth.appcunch.shop
      - KEYCLOAK_ENDPOINT_BASE=https://auth.appcunch.shop
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-admin-cli}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_ADMIN_REALM=${KEYCLOAK_ADMIN_REALM:-master}
      - KEYCLOAK_USER=${KEYCLOAK_USER}
      - KEYCLOAK_PASSWORD=${KEYCLOAK_PASSWORD}
      - KEYCLOAK_GRANT_TYPE=${KEYCLOAK_GRANT_TYPE:-password}
      - KEYCLOAK_SECRET_KEY=${KEYCLOAK_SECRET_KEY}
      - KEYCLOAK_CLIENT_USER_ID=${KEYCLOAK_CLIENT_USER_ID:-${KEYCLOAK_REALM}}
      - KEYCLOAK_CLIENT_UUID=${KEYCLOAK_CLIENT_UUID:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    command: >-
      sh -c "npm install &&
      npx prisma migrate deploy --schema=src/infrastructure/database/prisma/schema.prisma &&
      npx prisma generate --schema=src/infrastructure/database/prisma/schema.prisma &&
      npx tsx watch --clear-screen=false server.ts"
    restart: unless-stopped

  web:
    build: ./web
    container_name: web-igreja
    command: ["node", ".output/server/index.mjs"]
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NUXT_PUBLIC_URL_BACKEND=${NUXT_PUBLIC_URL_BACKEND:-http://localhost:${API_PORT}}
      - NODE_ENV=production
      - NPM_CONFIG_PRODUCTION=false
      - HOST=0.0.0.0
      - PORT=3000
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_PUBLIC_URL_BACKEND=${NUXT_PUBLIC_URL_BACKEND}
      - NUXT_PUBLIC_KEYCLOAK_URL=${NUXT_PUBLIC_KEYCLOAK_URL}
      - NUXT_PUBLIC_KEYCLOAK_REALM=${NUXT_PUBLIC_KEYCLOAK_REALM}
      - NUXT_PUBLIC_KEYCLOAK_CLIENT_ID=${NUXT_PUBLIC_KEYCLOAK_CLIENT_ID}
      - NUXT_PUBLIC_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: db-igreja
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db-igreja
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak_db
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: keycloak-igreja
    command: >-
      start-dev
      --http-enabled=true
      --proxy-headers=xforwarded
      --hostname=auth.appcunch.shop
      --hostname-admin=auth.appcunch.shop
      --hostname-strict=true
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: auth.appcunch.shop
      KC_HOSTNAME_ADMIN: auth.appcunch.shop
      KC_HOSTNAME_STRICT: "true"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  keycloak_pgdata:
  api_node_modules:
